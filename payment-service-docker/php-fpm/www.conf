[www]

listen = 0.0.0.0:9000

; ── Управление процессами ─────────────────────────────────
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500     ; перезапуск воркера после N запросов (защита от утечек памяти)

; ── Логи запросов (удобно для отладки) ───────────────────
access.log = /var/log/php/access.log
slowlog    = /var/log/php/slow.log
request_slowlog_timeout = 5s