services:

  # ── Application ──────────────────────────────────────────
  app:
    build: ./php-fpm
    volumes:
      - ../payment-service-backend:/var/www/html
      - ./php-fpm/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
      - ./php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./php-fpm/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./php-fpm/worker.conf:/etc/supervisor/conf.d/worker.conf:ro
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - backend
      - storage
    healthcheck:
      test: ["CMD", "supervisorctl", "-c", "/etc/supervisor/supervisord.conf", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ../payment-service-backend:/var/www/html:ro
      - ./nginx/www.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ../payment-service-frontend
      dockerfile: ../payment-service-docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ../payment-service-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - nginx
    networks:
      - backend
    restart: unless-stopped

  # ── Storage ───────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - storage
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    networks:
      - storage
    restart: unless-stopped

  # ── Dev Tools ─────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI → http://localhost:8025
    networks:
      - backend
    restart: unless-stopped

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: >
      listen
      --forward-to http://nginx/api/v1/webhooks/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - nginx
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  backend:
    driver: bridge   # nginx ↔ app ↔ frontend ↔ mailpit ↔ stripe-cli
  storage:
    driver: bridge   # app ↔ postgres, redis, rabbitmq